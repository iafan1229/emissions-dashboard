services:
  postgres:
    image: postgres:17
    container_name: dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard}
    ports:
      - "5433:5432"
    volumes:
      - dashboard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dashboard-postgres-data:
